name: Backend Dev CD

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Docker 이미지 빌드
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: gradle

      - name: gradlew 실행 권한 설정
        run: chmod +x gradlew

      - name: Gradle 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드 및 푸시 (Multi-platform)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/backend-app:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 개발서버 배포
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/${{ secrets.DEV_SERVER_USER }}/app
            
            echo "🚀 개발 서버 배포 시작..."
            
            echo "📦 최신 이미지 Pull..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend-app:dev
            
            echo "🌳 .env 파일 생성..."
            cat > .env <<'EOF'
            ${{ secrets.DEV_ENV_FILE }}
            EOF
            chmod 600 .env
            
            echo "▶️ 새 서버 시작..."
            docker compose --env-file .env pull backend
            docker compose --env-file .env up -d --force-recreate backend
            
            echo "🧹 사용하지 않는 이미지 정리..."
            docker image prune -a -f
            
            echo "⛑️ 헬스 체크..."
            for i in $(seq 1 15); do
              sleep 3
              SERVER_STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:80/actuator/health || echo "000")
              if [ "$SERVER_STATUS" -eq 200 ]; then
                echo "✅ 배포 성공! 서버 동작 중..."
                exit 0
              else
                echo "Attempt $i/15: 헬스 체크 실패 (status=$SERVER_STATUS). 재시도 중..."
              fi
            done
            
            echo "❌ 배포 실패! 서버가 동작하지 않습니다."
            echo "📋 최근 로그:"
            docker logs pickle-backend-dev --tail 100
            exit 1

      - name: 배포 결과 알림
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 배포가 성공적으로 완료되었습니다!"
            echo "배포 시간: $(date)"
            echo "커밋: ${{ github.sha }}"
          else
            echo "❌ 배포에 실패했습니다!"
            echo "GitHub Actions 로그를 확인해주세요."
          fi
